# Hermes AI Agent Config Template
# Copy or symlink to ~/.hermes/config.yaml
# Secrets use env vars — set them in ~/.zshrc

model:
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  context_length: 131072
  default: deepseek/deepseek-v4-flash
  provider: deepseek

providers: {}
fallback_providers: []
credential_pool_strategies: {}

toolsets:
  - hermes-cli

agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  tool_use_enforcement: auto
  image_input_mode: auto
  disabled_toolsets: []

terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true

browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false

checkpoints:
  enabled: true
  max_snapshots: 50
  retention_days: 7
